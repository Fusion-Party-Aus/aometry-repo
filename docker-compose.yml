services:
  bot:
    image: ghcr.io/aometry/aometry:main
    restart: unless-stopped

    env_file:
      - .env

    volumes:
      # Mount this repo's governance plugins into the container.
      # Adjust the target path to match wherever the Aometry host resolves
      # the @installed/governance/* alias (check the host's tsconfig or
      # module-resolution config if plugins aren't found at runtime).
      - ./governance:/app/installed/governance:ro

      # Persistent SQLite database — keeps submission/vote history across restarts.
      # Adjust the target path to wherever the host bot writes its DB file.
      - db-data:/app/data

    # Uncomment if the host exposes a health/metrics port:
    # ports:
    #   - "3000:3000"

volumes:
  db-data:
